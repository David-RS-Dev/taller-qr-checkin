<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cargando...</title>
    <script>
        const phone = "593962059311";
        const text = encodeURIComponent("Hola, quiero cotizar el cambio de pastillas de mi auto.");
        
        // Intentar abrir WhatsApp directamente
        window.location.href = `whatsapp://send?phone=${phone}&text=${text}`;
        
        // Si no funciona en 2 segundos, intentar wa.me
        setTimeout(() => {
            window.location.href = `https://wa.me/${phone}?text=${text}`;
        }, 2000);
    </script>
</head>
<body>
    <p>Abriendo WhatsApp...</p>
    <a href="https://wa.me/593962059311?text=Hola%2C%20quiero%20cotizar%20el%20cambio%20de%20pastillas%20de%20mi%20auto.">
        Si no se abre, toca aquí
    </a>
</body>
</html>
