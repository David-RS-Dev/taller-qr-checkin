<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expertos en Frenos - Redirigiendo...</title>
    
    <script>
        const tuNumeroTelefono = "593962059311"; 
        const mensajeWhatsApp = "Hola, quiero cotizar el cambio de pastillas de mi auto.";
        const mensajeCodificado = encodeURIComponent(mensajeWhatsApp);
        const whatsappURL = `https://wa.me/${tuNumeroTelefono}?text=${mensajeCodificado}`;

        // Intentar redirección inmediata
        window.location.href = whatsappURL;
        
        // Si no funciona en 2 segundos, mostrar botón
        setTimeout(() => {
            document.getElementById('fallback-btn').style.display = 'block';
            document.getElementById('loading-text').textContent = 'Si no se abrió WhatsApp automáticamente...';
        }, 2000);
    </script>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background: #f5f5f5;">
    <div style="max-width: 400px; margin: 0 auto;">
        <h2 style="color: #25D366; margin-bottom: 20px;"> Expertos en Frenos</h2>
        <p id="loading-text" style="color: #666; margin-bottom: 30px;">Abriendo WhatsApp...</p>
        
        <a id="fallback-btn" href="https://wa.me/593962059311?text=Hola%2C%20quiero%20cotizar%20el%20cambio%20de%20pastillas%20de%20mi%20auto." 
           style="display: none; background: #25D366; color: white; padding: 15px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px;">
           TOCAR PARA ABRIR WHATSAPP
        </a>
        
        <p style="color: #999; font-size: 14px; margin-top: 30px;">
            Si tienes problemas, asegúrate de tener WhatsApp instalado
        </p>
    </div>
</body>
</html>
