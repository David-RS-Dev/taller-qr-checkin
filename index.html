<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Taller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container">
        
        <section id="step-brand" class="step-section">
            <h2 class="step-title">Selecciona la marca de tu vehículo</h2>
            <div id="brand-options" class="options-grid"></div>
            
            <div id="custom-brand-container" class="custom-input-container hidden">
                <label for="custom-brand" class="input-label">Escribe la marca:</label>
                <input type="text" id="custom-brand" class="input-field" placeholder="Ej. Porsche">
                <button id="btn-next-brand" class="btn-next">Continuar</button>
            </div>
        </section>

        <section id="step-model" class="step-section hidden">
            <h2 class="step-title">Selecciona el modelo</h2>
            <div id="model-options" class="options-grid"></div>

            <div id="custom-model-container" class="custom-input-container hidden">
                <label for="custom-model" class="input-label">Escribe el modelo:</label>
                <input type="text" id="custom-model" class="input-field" placeholder="Ej. Macan">
                <button id="btn-next-model" class="btn-next">Continuar</button>
            </div>
        </section>

        <section id="step-year" class="step-section hidden">
            <h2 class="step-title">¿De qué año es tu vehículo?</h2>
            <div class="form-group">
                <label for="year-select" class="input-label">Selecciona de la lista:</label>
                <select id="year-select" class="select-field">
                    <option value="" disabled selected>Elige un año...</option>
                </select>
            </div>
            
            <div class="divider">ó</div>

            <div class="form-group">
                <label for="custom-year" class="input-label">Escríbelo directamente:</label>
                <input type="number" id="custom-year" class="input-field" min="1950" max="2026" placeholder="Ej. 2018">
            </div>

            <button id="btn-next-year" class="btn-next">Continuar</button>
        </section>

        <section id="step-service" class="step-section hidden">
            <h2 class="step-title">¿Qué servicio requiere tu vehículo?</h2>
            <div id="service-options" class="options-grid"></div>

            <div id="custom-service-container" class="custom-input-container hidden">
                <label for="custom-service" class="input-label">Describe el servicio o falla:</label>
                <textarea id="custom-service" class="textarea-field" placeholder="Ej. Ruido extraño en la suspensión delantera..."></textarea>
                <button id="btn-next-service" class="btn-next">Continuar</button>
            </div>
        </section>

        <section id="step-final" class="step-section hidden">
            <div class="success-message-container">
                <h2 class="step-title">¡Tu orden está lista!</h2>
                <p class="step-subtitle">Todos los datos requeridos han sido completados con éxito.</p>
            </div>
            
            <button id="btn-submit-order" class="btn-submit">ENVIAR A DAVID</button>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
